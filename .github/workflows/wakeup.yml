name: Wakeup Railway Server

on:
  schedule:
    # Runs at 7:00 AM GMT (UTC) every Monday through Friday.
    - cron: '0 7 * * 1-5'
  
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Perform Heavy Meilisearch Wakeup Queries
        env:
          MEILISEARCH_URL: ${{ secrets.MEILISEARCH_URL }}
          MEILISEARCH_KEY: ${{ secrets.MEILISEARCH_KEY }}
        run: |
          echo "Waking up Railway server with heavy search load..."
          
          # We perform multiple heavy queries (common letters/empty) with max limits
          # This forces Meilisearch to traverse a large portion of the inverted index 
          # and load the memory-mapped files (LMDB) into the system's RAM (Page Cache).
          
          QUERIES=("" "a" "e" "i" "o" "the" "email")
          
          for q in "${QUERIES[@]}"; do
            echo "Searching for '$q'..."
            curl -s -o /dev/null -X POST "$MEILISEARCH_URL/indexes/emails/search" \
              -H "Authorization: Bearer $MEILISEARCH_KEY" \
              -H "Content-Type: application/json" \
              --data-binary "{\"q\": \"$q\", \"limit\": 1000, \"offset\": 0}"
          done
          
          echo "Heavy queries complete. Server is fully awake and data is loaded into RAM!"
