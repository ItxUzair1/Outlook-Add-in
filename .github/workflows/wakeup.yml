name: Wakeup Railway Server

on:
  schedule:
    # Runs at 7:00 AM GMT (UTC) every Monday through Friday.
    - cron: '0 7 * * 1-5'
  
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Perform Meilisearch Wakeup Query
        env:
          MEILISEARCH_URL: ${{ secrets.MEILISEARCH_URL }}
          MEILISEARCH_KEY: ${{ secrets.MEILISEARCH_KEY }}
        run: |
          echo "Waking up Railway server via Search..."
          # Performs the search query for 'paul' 3 times to ensure the instance stays awake
          for i in 1 2 3; do
            echo "Executing wakeup query $i/3..."
            curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" -X POST "$MEILISEARCH_URL/indexes/emails/search" \
              -H "Authorization: Bearer $MEILISEARCH_KEY" \
              -H "Content-Type: application/json" \
              --data-binary '{"q": "paul", "limit": 1000}'
          done
          echo "Server is awake!"

